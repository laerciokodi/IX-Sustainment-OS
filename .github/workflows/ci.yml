name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify required documentation files
        run: make docs-check

      - name: Verify schema directory
        run: make schema-check

      - name: Check Go formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "The following files are not gofmt-formatted:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run Go vet
        run: make vet

      - name: Build backend
        run: make build

      - name: Run Go tests
        run: make test

      - name: Lint OpenAPI specification
        run: make api-check

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm install

      - name: Build frontend
        working-directory: ./web
        run: npm run build

      - name: Run frontend smoke test
        working-directory: ./web
        run: npm test
